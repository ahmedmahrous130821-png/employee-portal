<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين الإلكترونية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 600px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .login-box { text-align: center; }
        .form-group { margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .portal-area { display: none; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: right; }
        .data-item { background: #f8fafc; padding: 10px; border-radius: 8px; }
        .error-msg { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="login-box">
        <h2>🔐 تسجيل دخول الموظفين</h2>
        <div class="form-group"><label>كود الموظف:</label><input type="text" id="loginCode"></div>
        <div class="form-group"><label>كلمة المرور:</label><input type="password" id="loginPassword"></div>
        <button class="btn" onclick="loginEmployee()">دخول</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="portalSection" class="portal-area">
        <h3>مرحباً: <span id="empName"></span></h3>
        <div id="printArea" class="data-grid">
            <div class="data-item">كود: <span id="res_code"></span></div>
            <div class="data-item">الراتب: <span id="res_salary"></span></div>
        </div>
        <button class="btn" style="margin-top:20px; background:green;" onclick="window.print()">طباعة</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://pvyqtvnyjeqtxfnenrog.supabase.co';
    const supabaseKey = 'sb_publishable_szYgsZqp9bytZY5bwObdFw_GQbTNvNB';
    
    // الاتصال المباشر
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loginEmployee() {
        const code = document.getElementById('loginCode').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        const errorZone = document.getElementById('loginError');

        const { data, error } = await supabase.from('employees').select('*').eq('كود', code);

        if (error || !data || data.length === 0) {
            errorZone.innerText = "خطأ في الكود أو كلمة المرور";
            errorZone.style.display = "block";
            return;
        }

        const user = data[0];
        if (String(user['password'] || user['كلمة المرور']).trim() === pass) {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('portalSection').style.display = "block";
            document.getElementById('empName').innerText = user['اسم الموظف'];
            document.getElementById('res_code').innerText = user['كود'];
            document.getElementById('res_salary').innerText = user['الراتب الشامل'];
        } else {
            errorZone.innerText = "كلمة المرور غير صحيحة";
            errorZone.style.display = "block";
        }
    }
</script>
</body>
</html>
