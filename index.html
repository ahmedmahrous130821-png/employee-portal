<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام الموظفين</h2>
        <p id="status">جاري الاتصال بقاعدة البيانات...</p>
    </div>

    <script>
        const supabaseUrl = 'https://pvyqtvnyjeqtxfnenrog.supabase.co';
        const supabaseKey = 'sb_publishable_szYgsZqp9bytZY5bwObdFw_GQbTNvNB';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // التحقق من الاتصال
        supabase.from('employees').select('count', { count: 'exact', head: true })
            .then(({ count, error }) => {
                if (error) {
                    document.getElementById('status').innerText = "خطأ في الاتصال بالسيرفر.";
                } else {
                    document.getElementById('status').innerText = "تم الاتصال بنجاح! السيرفر جاهز للعمل.";
                }
            });
    </script>
</body>
</html>
