<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة واستعلام الموظفين الديناميكي - Supabase Live</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f0f4f8; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0f172a; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card-section { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: 700; color: #334155; }
        input[type="text"] { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; transition: all 0.3s; width: -webkit-fill-available; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #0284c7; outline: none; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15); }
        
        .btn { background: #0284c7; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box; }
        .btn:hover { background: #0369a1; }
        
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }

        .actions-row { display: flex; gap: 10px; flex-wrap: wrap; width: 100%; }
        .actions-row .btn { flex: 1; min-width: 140px; }
        
        .result-area { display: none; margin-top: 30px; animation: fadeIn 0.3s ease-in-out; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0284c7; margin-bottom: 20px; padding-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .section-title { font-size: 18px; font-weight: 700; color: #0284c7; margin: 0; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .data-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 5px; }
        .data-label { font-size: 13px; font-weight: 600; color: #64748b; }
        .data-value { font-size: 17px; font-weight: 700; color: #0f172a; word-break: break-word; }
        .money-value { color: #16a34a; }

        .reset-link { text-align: center; margin-top: 5px; font-size: 13px; }
        .reset-link a { color: #dc2626; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        .error-msg { color: #dc2626; font-weight: bold; text-align: center; margin-top: 15px; display: none; background: #fef2f2; padding: 10px; border-radius: 6px; border: 1px solid #fee2e2; }
        .status-msg { font-size: 13px; font-weight: 600; margin-top: 5px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة التحكم الذكية والمطورة لشئون الموظفين (Supabase Live)</h2>
    
    <div class="setup-grid">
        <div class="card-section">
            <div class="form-group">
                <label>1. مزامنة البيانات:</label>
                <div id="uploadStatus" class="status-msg" style="color: #c2410c;">جاري فحص الاتصال بالسيرفر...</div>
            </div>
            <button class="btn btn-secondary" id="exportAllBtn" onclick="exportAllToExcel()">📊 تحميل الشيت كاملاً من السيرفر</button>
            <div class="reset-link"><a onclick="resetConnection()">🔄 إعادة ضبط مفاتيح الاتصال</a></div>
        </div>

        <div class="card-section">
            <label>2. إدارة شؤون الموظفين (Live):</label>
            <div class="actions-row">
                <button class="btn btn-success" id="addEmpBtn" onclick="showAddEmployeeModal()">➕ إضافة موظف جديد</button>
                <button class="btn btn-danger" id="resignBtn" onclick="setEmployeeResigned()">🚪 تسجيل استقالة الحالي</button>
            </div>
            <div class="status-msg" id="actionStatus" style="color: #0284c7; text-align: center;"></div>
        </div>

        <div class="card-section">
            <div class="form-group">
                <label for="empCode">3. استعلام سريع بكود الموظف:</label>
                <input type="text" id="empCode" placeholder="اكتب الكود واضغط بحث...">
                <button class="btn" id="searchBtn" onclick="searchEmployee()">🔍 استعلام وعرض البيانات</button>
            </div>
        </div>
    </div>

    <div id="errorZone" class="error-msg"></div>

    <div class="result-area" id="resultArea">
        <div class="section-header">
            <div class="section-title">ملف بيانات الموظف المستعلم عنه</div>
            <div class="actions-row" style="margin: 0; width: auto;">
                <button class="btn btn-success" onclick="exportCurrentToExcel()">📊 تصدير هذا الموظف Excel</button>
                <button class="btn btn-danger" onclick="exportToPDF()">📄 تحميل النتيجة PDF</button>
            </div>
        </div>
        
        <div id="printArea" style="padding: 10px; background: white;">
            <div class="data-grid">
                <div class="data-item"><span class="data-label">كود الموظف</span><span class="data-value" id="res_code">-</span></div>
                <div class="data-item"><span class="data-label">اسم الموظف</span><span class="data-value" id="res_name">-</span></div>
                <div class="data-item"><span class="data-label">الوظيفه</span><span class="data-value" id="res_job">-</span></div>
                <div class="data-item"><span class="data-label">تاريخ التعيين</span><span class="data-value" id="res_date">-</span></div>
                <div class="data-item"><span class="data-label">الرصيد</span><span class="data-value" id="res_balance">-</span></div>
                <div class="data-item"><span class="data-label">الراتب الشامل</span><span class="data-value money-value" id="res_total_salary">-</span></div>
                <div class="data-item"><span class="data-label">صافي الراتب</span><span class="data-value money-value" id="res_net_salary">-</span></div>
                <div class="data-item"><span class="data-label">التامينات</span><span class="data-value" id="res_insurance">-</span></div>
                <div class="data-item"><span class="data-label">الضرائب</span><span class="data-value" id="res_taxes">-</span></div>
                <div class="data-item"><span class="data-label">اضافي</span><span class="data-value" id="res_overtime">-</span></div>
                <div class="data-item"><span class="data-label">استقطاعات</span><span class="data-value" id="res_deductions">-</span></div>
                <div class="data-item"><span class="data-label">قيمه اليوم</span><span class="data-value money-value" id="res_day_value">-</span></div>
                <div class="data-item"><span class="data-label">راتب</span><span class="data-value money-value" id="res_base_salary">-</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    let SUPABASE_URL = localStorage.getItem('supabase_url');
    let SUPABASE_ANON_KEY = localStorage.getItem('supabase_key');
    let client = null;
    let currentEmployee = null;

    function initSupabase() {
        // التأكد من جلب البيانات بشكل صحيح وتصاعدي لمنع التعليق
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            let urlInput = prompt("الرجاء إدخال رابط مشروع Supabase (Project URL):");
            if (!urlInput) {
                document.getElementById('uploadStatus').innerText = "❌ لم يتم إدخال رابط السيرفر.";
                return;
            }
            
            let keyInput = prompt("الرجاء إدخال مفتاح الـ API الخاص بمشروعك (Anon Key):");
            if (!keyInput) {
                document.getElementById('uploadStatus').innerText = "❌ لم يتم إدخال مفتاح السيرفر.";
                return;
            }

            SUPABASE_URL = urlInput.trim().replace(/\/+$/, "");
            SUPABASE_ANON_KEY = keyInput.trim();
            
            localStorage.setItem('supabase_url', SUPABASE_URL);
            localStorage.setItem('supabase_key', SUPABASE_ANON_KEY);
        } else {
            SUPABASE_URL = SUPABASE_URL.trim().replace(/\/+$/, "");
            SUPABASE_ANON_KEY = SUPABASE_ANON_KEY.trim();
        }
        
        try {
            // التعديل الجوهري: استخدام الحروف الصغيرة للمكتبة كما تفرضها النسخة v2
            if (window.supabase) {
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                checkConnection();
            } else {
                document.getElementById('uploadStatus').innerText = "❌ فشل تحميل ملفات Supabase الخارجية.";
                document.getElementById('uploadStatus').style.color = "#dc2626";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('uploadStatus').innerText = "❌ خطأ في تهيئة المفاتيح! يرجى إعادة الضبط.";
            document.getElementById('uploadStatus').style.color = "#dc2626";
        }
    }

    // تشغيل نظام الربط تلقائياً عند فتح اللوحة
    window.onload = function() {
        initSupabase();
    };

    async function checkConnection() {
        if (!client) return;
        try {
            const { data, error } = await client.from('employees').select('*').limit(1);
            if (error) throw error;
            document.getElementById('uploadStatus').innerText = "✔️ متصل بالسيرفر بنجاح وجاهز للاستعلام.";
            document.getElementById('uploadStatus').style.color = "#16a34a";
        } catch (err) {
            document.getElementById('uploadStatus').innerText = "❌ فشل الاتصال! يرجى التأكد من تعطيل الـ RLS بالجدول.";
            document.getElementById('uploadStatus').style.color = "#dc2626";
            console.error(err);
        }
    }

    function resetConnection() {
        if(confirm("هل تريد مسح إعدادات الاتصال الحالية وإدخال روابط جديدة؟")) {
            localStorage.removeItem('supabase_url');
            localStorage.removeItem('supabase_key');
            location.reload();
        }
    }

    function formatNumber(val) {
        if (val === undefined || val === null || val === '') return '0';
        if (!isNaN(val)) {
            const num = parseFloat(val);
            return num % 1 !== 0 ? num.toFixed(2) : num.toString();
        }
        return val;
    }

    async function searchEmployee() {
        if (!client) return alert("الرجاء إدخال بيانات الاتصال بالسيرفر أولاً.");

        const codeInput = document.getElementById('empCode').value.trim();
        const errorZone = document.getElementById('errorZone');
        const resultArea = document.getElementById('resultArea');
        
        errorZone.style.display = "none";
        if (!codeInput) {
            errorZone.innerText = "برجاء كتابة الكود أولاً.";
            errorZone.style.display = "block";
            return;
        }

        document.getElementById('uploadStatus').innerText = "جاري جلب البيانات...";

        // الربط الذكي المباشر مع الحقول المكتوبة باللغة العربية
        const { data, error } = await client
            .from('employees')
            .select('*')
            .eq('كود', parseInt(codeInput) || codeInput);

        if (error) {
            errorZone.innerText = "حدث خطأ أثناء الاتصال بالخادم: " + error.message;
            errorZone.style.display = "block";
            return;
        }

        checkConnection();

        if (data && data.length > 0) {
            currentEmployee = data[0];
            
            document.getElementById('res_code').innerText = currentEmployee['كود'] || '-';
            document.getElementById('res_name').innerText = currentEmployee['اسم الموظف'] || '-';
            
            const jobVal = currentEmployee['الوظيفه'] || '-';
            const jobElement = document.getElementById('res_job');
            jobElement.innerText = jobVal;
            jobElement.style.color = (jobVal === "مستقيل ❌") ? "#dc2626" : "#0f172a";

            document.getElementById('res_date').innerText = currentEmployee['تاريخ التعيين'] || '-';
            document.getElementById('res_balance').innerText = formatNumber(currentEmployee['الرصيد']);
            document.getElementById('res_total_salary').innerText = formatNumber(currentEmployee['الراتب الشامل']);
            
            // ربط بقية الحقول الاختيارية والمالية باللوحة الفيجوال
            document.getElementById('res_net_salary').innerText = formatNumber(currentEmployee['صافي الراتب']);
            document.getElementById('res_insurance').innerText = formatNumber(currentEmployee['التامينات']);
            document.getElementById('res_taxes').innerText = formatNumber(currentEmployee['الضرائب']);
            document.getElementById('res_overtime').innerText = formatNumber(currentEmployee['اضافي']);
            document.getElementById('res_deductions').innerText = formatNumber(currentEmployee['استقطاعات']);
            document.getElementById('res_day_value').innerText = formatNumber(currentEmployee['قيمه اليوم']);
            document.getElementById('res_base_salary').innerText = formatNumber(currentEmployee['راتب']);
            
            resultArea.style.display = "block";
        } else {
            resultArea.style.display = "none";
            errorZone.innerText = `عذراً، لم يتم العثور على الكود (${codeInput}) في قاعدة البيانات.`;
            errorZone.style.display = "block";
        }
    }

    async function showAddEmployeeModal() {
        if (!client) return alert("الرجاء إدخال بيانات الاتصال بالسيرفر أولاً.");

        const code = prompt("أدخل كود الموظف الجديد:");
        if (!code) return;
        
        const name = prompt("أدخل اسم الموظف الكامل:");
        const job = prompt("أدخل الوظيفة:");
        const salary = prompt("أدخل الراتب الشامل:");

        const newEmp = {
            "كود": parseInt(code) || code,
            "اسم الموظف": name || "-",
            "الوظيفه": job || "-",
            "تاريخ التعيين": new Date().toLocaleDateString('en-GB'),
            "الرصيد": 0,
            "الراتب الشامل": parseFloat(salary) || 0,
            "صافي الراتب": parseFloat(salary) || 0,
            "التامينات": 0,
            "الضرائب": 0,
            "اضافي": 0,
            "استقطاعات": 0,
            "قيمه اليوم": 0,
            "راتب": 0
        };

        const { error: insertError } = await client.from('employees').insert([newEmp]);

        if (insertError) {
            alert("حدث خطأ أثناء الإضافة: " + insertError.message);
        } else {
            alert(`تم إضافة الموظف (${name}) بنجاح!`);
            document.getElementById('empCode').value = code;
            searchEmployee(); 
        }
    }

    async function setEmployeeResigned() {
        if (!client || !currentEmployee) {
            alert("برجاء الاستعلام عن الموظف المراد تسجيل استقالته أولاً.");
            return;
        }
        
        if (confirm(`هل أنت متأكد من تغيير حالة الموظف إلى مستقيل؟`)) {
            const { error } = await client
                .from('employees')
                .update({ 'الوظيفه': "مستقيل ❌" })
                .eq('كود', currentEmployee['كود']);

            if (error) {
                alert("حدث خطأ أثناء تحديث الحالة: " + error.message);
            } else {
                alert("تم تسجيل الاستقالة بنجاح!");
                searchEmployee(); 
            }
        }
    }

    function exportCurrentToExcel() {
        if (!currentEmployee) return;
        const ws = XLSX.utils.json_to_sheet([currentEmployee]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "بيانات الموظف");
        XLSX.writeFile(wb, `بيانات_موظف_${document.getElementById('res_code').innerText}.xlsx`);
    }

    async function exportAllToExcel() {
        if (!client) return;
        document.getElementById('actionStatus').innerText = "جاري جلب كامل البيانات للتصدير...";
        const { data, error } = await client.from('employees').select('*');

        if (error) {
            alert("فشل التصدير: " + error.message);
            document.getElementById('actionStatus').innerText = "";
            return;
        }

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "الداتا كاملة");
        XLSX.writeFile(wb, "شيت_الموظفين_المستخرج.xlsx");
        document.getElementById('actionStatus').innerText = "";
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('printArea');
        
        html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 190; 
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
            pdf.save(`بيانات_موظف_${document.getElementById('res_code').innerText}.pdf`);
        });
    }
</script>
</body>
</html>
